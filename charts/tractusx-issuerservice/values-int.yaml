---
# Example values file for deploying the issuer-service with an external
# HashiCorp Vault instance (i.e., the bundled dev Vault is disabled).
#
# Secrets referenced with the <path:...> syntax are resolved at deploy-time
# by the ArgoCD Vault Plugin (AVP) or an equivalent secrets-injection tool.

nameOverride: issuer-service
fullnameOverride: issuer-service

install:
  # -- Disable the bundled PostgreSQL subchart; use an external database instead
  postgresql: true
  # -- Disable the bundled HashiCorp Vault dev-mode subchart
  vault: false

issuerservice:
  image:
    pullPolicy: Always

  endpoints:
    default:
      port: 8081
      path: /api
    issuance:
      port: 8082
      path: /api/issuance
    did:
      port: 8083
      path: /
    version:
      port: 8084
      path: /.well-known/api
      pathType: ImplementationSpecific
    sts:
      port: 8085
      path: /api/sts
    issueradmin:
      port: 8086
      path: /api/admin
    identity:
      port: 8087
      path: /api/identity
    statuslist:
      port: 8088
      path: /statuslist

  ## Ingress declaration to expose the network service.
  ingresses:
    ## Single Ingress exposing all endpoints under one hostname
    - enabled: true
      # -- The hostname to be used to precisely map incoming traffic onto the underlying network service
      hostname: "issuer-service.int.catena-x.net"
      # -- Defines the [ingress class](https://kubernetes.io/docs/concepts/services-networking/ingress/#ingress-class) to use
      className: "nginx"
      # -- Additional ingress annotations to add
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
      # -- Endpoints exposed by this ingress resource
      endpoints:
        - issuance
        - did
        - sts
        - statuslist
        - issueradmin
        - identity
        - version
      # -- TLS [tls class](https://kubernetes.io/docs/concepts/services-networking/ingress/#tls) applied to the ingress resource
      tls:
        # -- Enables TLS on the ingress resource
        enabled: true
        # -- If present overwrites the default secret name
        secretName: "tls-secret-issuer-service"
      ## Adds [cert-manager](https://cert-manager.io/docs/) annotations to the ingress resource
      certManager:
        # -- If preset enables certificate generation via cert-manager namespace scoped issuer
        issuer: ""
        # -- If preset enables certificate generation via cert-manager cluster-wide issuer
        clusterIssuer: ""

  resources:
    limits:
      cpu: 1.5
      memory: 512Mi
    requests:
      cpu: 500m
      memory: 128Mi

#############################
## PostgreSQL configuration
#############################
postgresql:
  nameOverride: issuer-service-postgresql
  fullnameOverride: issuer-service-postgresql
  jdbcUrl: "jdbc:postgresql://issuer-service-postgresql:5432/issuer"
  auth:
    database: "issuer"
    username: <path:identity-hub/data/db#username>
    password: <path:identity-hub/data/db#password>

####################################
## External HashiCorp Vault config
####################################
vault:
  hashicorp:
    # -- URL of the external HashiCorp Vault instance
    url: <path:identity-hub/data/vault#url>
    # -- Authentication token for the external vault
    token: <path:identity-hub/data/vault#token>
    # -- Timeout in seconds for vault operations
    timeout: 30
    healthCheck:
      enabled: true
      standbyOk: true
    paths:
      # -- Base path for the KV secrets engine (e.g. /v1/secret)
      secret: <path:identity-hub/data/vault#secretPath>
      # -- Health check endpoint of the vault
      health: /v1/sys/health

####################################
## StatusList configuration
####################################
statuslist:
  signing_key:
    alias: default
  callback:
    address: "https://issuer-service.int.catena-x.net"
