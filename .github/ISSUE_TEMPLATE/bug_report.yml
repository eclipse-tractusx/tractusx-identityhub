name: Bug Report
description: Report a bug or unexpected behavior in Tractus-X IdentityHub / IssuerService
title: "[BUG] <short description>"
labels: ["bug", "triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which component is affected?
      options:
        - IdentityHub
        - IssuerService
        - Both
        - Helm Charts
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Which version of Tractus-X IdentityHub are you running?
      placeholder: "e.g., 0.7.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "Describe the unexpected behavior..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
      placeholder: "Instead, what happened was..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide a minimal set of steps to reproduce the issue.
      placeholder: |
        1. Call `POST /v1alpha/participants/{id}/credentialdefinitions` with payload `...`
        2. Then call `POST /api/sts/v1/token`
        3. Observe error / unexpected output
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs / API Responses
      description: Paste any relevant logs, error messages, or API responses.
      render: shell

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Type
      options:
        - Kubernetes (Helm)
        - Docker Compose
        - Local / IDE
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Provide details about your environment.
      placeholder: |
        - OS: macOS 14 / Ubuntu 22.04 / ...
        - Java version: 21
        - Kubernetes version: 1.29
        - Database: PostgreSQL 15
      render: markdown

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or related issues.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
        - label: I have provided a minimal reproduction case.
          required: false
        - label: I am willing to submit a pull request to fix this.
          required: false
